<div class="auth-page">
  <app-loading-overlay [loading]="loading()" message="Verifying your email…" />

  <div class="auth-card">
    <div class="auth-brand">
      <h1>Email verification</h1>
    </div>

    @if (!loading()) {
    @if (errorMessage()) {
      <div class="alert alert-error" role="alert">
        {{ errorMessage() }}
      </div>
      <p class="auth-footer">
        <a routerLink="/signup">Sign up again</a>
        ·
        <a routerLink="/login">Sign in</a>
      </p>
    }
    }
  </div>
</div>
