<section class="page-card">
  <h1>Profile</h1>
  @if (auth.currentUser(); as user) {
    <dl class="profile-details">
      <div>
        <dt>Email</dt>
        <dd>{{ user.email }}</dd>
      </div>
      <div>
        <dt>Role</dt>
        <dd>{{ user.role }}</dd>
      </div>
      <div>
        <dt>Company</dt>
        <dd>{{ user.companyName }}</dd>
      </div>
      <div>
        <dt>User ID</dt>
        <dd>{{ user.userId }}</dd>
      </div>
    </dl>
  }
</section>
