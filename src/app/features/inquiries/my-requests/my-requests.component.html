<div class="queries-page">
  <section class="page-card form-section">
    <header class="page-header">
      <h1>Create quotation</h1>
      <button type="button" class="btn-clear" (click)="requestPanel.clearForm()">Clear form</button>
    </header>

    <app-product-request-panel #requestPanel (submitted)="onSubmitted()" />
  </section>

  <div class="quotation-form-actions">
    <button type="button" class="btn-add" (click)="requestPanel.addRow()">Add</button>
    <button
      type="button"
      class="btn-preview"
      (click)="requestPanel.openPreview()"
      [disabled]="requestPanel.previewRows().length === 0"
    >
      Preview
    </button>
  </div>
</div>
