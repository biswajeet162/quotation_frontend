<div class="queries-page">
  <section class="page-card form-section">
    <header class="page-header">
      <h1>Create inquiry</h1>
      <div class="header-actions">
        <button type="button" class="btn-clear" (click)="clearForm()">Clear form</button>
        <button
          type="button"
          class="btn-preview-header"
          (click)="openPreview()"
          [disabled]="!canPreview()"
        >
          Preview
        </button>
      </div>
    </header>

    <app-product-request-panel #requestPanel (submitted)="onSubmitted()" />
  </section>
</div>
