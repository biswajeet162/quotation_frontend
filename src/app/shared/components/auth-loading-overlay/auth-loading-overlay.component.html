@if (loading()) {
  <div class="auth-loading-overlay" role="status" aria-live="polite" aria-busy="true">
    <div class="auth-loading-content">
      <div class="auth-spinner" aria-hidden="true"></div>
      @if (message()) {
        <p class="auth-loading-message">{{ message() }}</p>
      }
    </div>
  </div>
}
