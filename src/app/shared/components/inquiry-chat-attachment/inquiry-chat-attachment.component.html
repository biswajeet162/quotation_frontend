@if (loading()) {
  <span class="attachment-loading">Loading…</span>
} @else if (error()) {
  <span class="attachment-error">Could not load attachment</span>
} @else if (objectUrl()) {
  @switch (attachment().mediaType) {
    @case ('IMAGE') {
      <img [src]="objectUrl()!" [alt]="attachment().fileName" class="chat-image" loading="lazy" />
    }
    @case ('VIDEO') {
      <video [src]="objectUrl()!" class="chat-video" controls preload="metadata">
        Your browser does not support video playback.
      </video>
    }
    @case ('AUDIO') {
      <app-chat-audio-player
        [src]="objectUrl()!"
        [label]="attachmentLabel()"
        [compact]="true"
        [showLabel]="false"
      />
    }
  }
  @if (attachment().mediaType !== 'AUDIO') {
    <span class="attachment-name">{{ attachment().fileName }}</span>
  }
}
